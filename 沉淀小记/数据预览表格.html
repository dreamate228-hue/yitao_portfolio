<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据分析 Agent 输入框动效原型 - 重做版</title>
  <style>
    :root {
      --c-title: #102048;
      --c-desc: #79809a;
      --c-muted: #a9a9b8;
      --c-line: #d9d9e0;
      --c-line-soft: #e8e8f0;
      --c-head: #fafafc;
      --c-brand: #5940ff;
      --c-select: #f1f0ff;
      --c-tag: #f3f3fa;
      --preview-h: 378px;
      --preview-flow-h: calc(var(--preview-h) + 60px);
      --hero-space: 202px;
      --open-ms: 500ms;
      --close-ms: 360ms;
      --hero-fade-ms: 150ms;
      --overlap: .4;
      --preview-delay-ms: 90ms;
      --small-delay-ms: 342ms;
      --preview-close-delay-ms: 132ms;
      --hero-return-delay-ms: 336ms;
      --small-ms: 220ms;
      --avatar-rise: 20px;
      --switch-fade-ms: 200ms;
      --ease: cubic-bezier(.2, .82, .2, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 1024px;
      min-height: 720px;
      overflow: hidden;
      color: var(--c-title);
      background: #fff;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    button, textarea, select, input { font: inherit; }
    button { padding: 0; border: 0; background: none; color: inherit; cursor: pointer; }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    .top-mask {
      position: absolute;
      left: 50%;
      top: 0;
      width: 1120px;
      height: 240px;
      transform: translateX(-50%);
      overflow: hidden;
      pointer-events: none;
    }

    .top-mask img {
      position: absolute;
      left: 0;
      top: -990px;
      width: 1120px;
      height: 1120px;
      display: block;
    }

    .stage {
      position: absolute;
      left: 50%;
      top: 160px;
      width: 840px;
      transform: translateX(-50%);
      transition: top var(--open-ms) var(--ease);
      will-change: top;
    }

    .page.is-open .stage {
      top: 80px;
      transition-delay: var(--preview-delay-ms);
    }

    .page.is-closing .stage {
      top: 160px;
      transition: top var(--close-ms) var(--ease) var(--preview-close-delay-ms);
    }

    .hero {
      width: 447px;
      height: 170px;
      margin: 0 auto 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 1;
      overflow: hidden;
      will-change: opacity;
      transition: opacity var(--hero-fade-ms) linear;
    }

    .page.is-open .hero {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--hero-fade-ms) linear;
    }

    .page.is-closing .hero {
      opacity: 1;
      transition: opacity var(--hero-fade-ms) linear var(--hero-return-delay-ms);
    }

    .assistant-big {
      width: 100px;
      height: 100px;
      display: block;
      transform: translateX(-6px);
    }

    .hero-name {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 24px;
      line-height: 34px;
      font-weight: 600;
    }

    .hero-name img {
      width: 18px;
      height: 18px;
      transform: scaleY(-1);
      display: block;
    }

    .hero-sub {
      margin: 0;
      color: var(--c-desc);
      font-size: 14px;
      line-height: 20px;
      text-align: center;
    }

    .compact {
      position: absolute;
      left: 0;
      top: 0;
      width: 150px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transform: translateY(var(--avatar-rise));
      will-change: opacity, transform;
      transition:
        opacity var(--small-ms) var(--ease) var(--small-delay-ms),
        transform var(--small-ms) var(--ease) var(--small-delay-ms);
    }

    .page.is-open .compact {
      opacity: 1;
      transform: translateY(0);
    }

    .page.is-closing .compact {
      opacity: 0;
      transform: translateY(var(--avatar-rise));
      transition:
        opacity var(--small-ms) var(--ease),
        transform var(--small-ms) var(--ease);
    }

    .assistant-small {
      width: 48px;
      height: 48px;
      display: block;
      transform: translateX(-2.4px);
    }

    .compact-name {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 24px;
      font-size: 18px;
      line-height: 24px;
      font-weight: 500;
      white-space: nowrap;
    }

    .compact-name img {
      width: 18px;
      height: 18px;
      transform: scaleY(-1);
      display: block;
    }

    .preview-shell {
      position: relative;
      height: 0;
      margin-top: 0;
      margin-bottom: 0;
      overflow: visible;
      opacity: 0;
      transform-origin: top center;
      transform: translateY(-8px);
      pointer-events: none;
      will-change: height, margin-bottom, opacity, transform;
      transition:
        height var(--close-ms) var(--ease),
        margin-top var(--close-ms) var(--ease),
        margin-bottom var(--close-ms) var(--ease),
        opacity 160ms linear,
        transform var(--close-ms) var(--ease);
    }

    .page.is-open .preview-shell {
      height: var(--preview-flow-h);
      margin-top: calc(-1 * var(--hero-space));
      margin-bottom: 8px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      transition:
        height var(--open-ms) var(--ease) var(--preview-delay-ms),
        margin-top var(--open-ms) var(--ease) var(--preview-delay-ms),
        margin-bottom var(--open-ms) var(--ease) var(--preview-delay-ms),
        opacity 180ms linear var(--preview-delay-ms),
        transform var(--open-ms) var(--ease) var(--preview-delay-ms);
    }

    .page.is-closing .preview-shell {
      height: 0;
      margin-top: 0;
      margin-bottom: 0;
      opacity: 0;
      transform: translateY(-8px);
      transition:
        height var(--close-ms) var(--ease) var(--preview-close-delay-ms),
        margin-top var(--close-ms) var(--ease) var(--preview-close-delay-ms),
        margin-bottom var(--close-ms) var(--ease) var(--preview-close-delay-ms),
        opacity 160ms linear var(--preview-close-delay-ms),
        transform var(--close-ms) var(--ease) var(--preview-close-delay-ms);
    }

    .preview-card {
      position: absolute;
      left: 0;
      top: 60px;
      width: 840px;
      height: var(--preview-h);
      padding: 16px;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 51, .12);
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      transform: scaleY(.96) translateZ(0);
      transform-origin: top center;
      will-change: opacity, transform;
      transition:
        opacity 180ms linear,
        transform var(--close-ms) var(--ease);
      backface-visibility: hidden;
    }

    .page.is-open .preview-card {
      opacity: 1;
      transform: scaleY(1) translateZ(0);
      transition:
        opacity 180ms linear var(--preview-delay-ms),
        transform var(--open-ms) var(--ease) var(--preview-delay-ms);
    }

    .page.is-closing .preview-card {
      opacity: 0;
      transform: scaleY(.96) translateZ(0);
      transition:
        opacity 160ms linear var(--preview-close-delay-ms),
        transform var(--close-ms) var(--ease) var(--preview-close-delay-ms);
    }

    .preview-content {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 1;
      transition: opacity var(--switch-fade-ms) linear;
    }

    .preview-content.is-switching { opacity: 0; }

    .preview-head-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 808px;
      flex: 0 0 auto;
    }

    .preview-top {
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preview-title-wrap {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .preview-title {
      border-bottom: 1px dotted currentColor;
      color: var(--c-title);
      font-size: 16px;
      line-height: 24px;
      font-weight: 500;
      white-space: nowrap;
    }

    .preview-title-arrow {
      width: 14px;
      height: 14px;
      display: block;
      transform: scaleY(-1);
      transition: transform 180ms var(--ease);
    }

    .preview-card.is-desc-collapsed .preview-title-arrow {
      transform: scaleY(1);
    }

    .preview-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 56px;
      height: 24px;
    }

    .preview-action {
      width: 24px;
      height: 24px;
      padding: 4px;
      display: grid;
      place-items: center;
      border-radius: 4px;
    }

    .preview-action:hover { background: var(--c-tag); }
    .preview-action img { width: 16px; height: 16px; display: block; }
    .preview-action .icon-frame-24 { width: 24px; height: 24px; margin: -4px; }
    .preview-close-icon { transform: none; }

    .desc-block {
      height: 50px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
      color: var(--c-title);
      font-size: 14px;
      line-height: 22px;
      transition: height 220ms var(--ease), opacity 160ms linear;
    }

    .preview-card.is-desc-collapsed .desc-block {
      height: 0;
      opacity: 0;
    }

    .desc-line {
      height: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }

    .desc-line span:first-child { color: var(--c-desc); }

    .table-block {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 808px;
    }

    .toolbar {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      line-height: 22px;
    }

    .toolbar strong {
      font-weight: 500;
      line-height: 22px;
    }

    .toolbar-right {
      width: 268px;
      height: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .grain {
      width: 136px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .select-month {
      width: 72px;
      height: 28px;
      padding: 4px 12px;
      border: 1px solid var(--c-line);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }

    .select-month img {
      width: 8px;
      height: 4px;
      transform: scaleY(-1);
    }

    .static-tools {
      width: 116px;
      height: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--c-desc);
    }

    .static-tool {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      cursor: default;
    }

    .static-tool img {
      width: 14px;
      height: 14px;
      display: block;
    }

    .tool-divider {
      width: 0;
      height: 14px;
      display: grid;
      place-items: center;
    }

    .tool-divider img {
      width: 14px;
      height: 1px;
      transform: rotate(90deg);
    }

    .table-viewport {
      width: 808px;
      min-height: 0;
      flex: 1;
      overflow: auto;
      scrollbar-width: none;
    }

    .table-viewport::-webkit-scrollbar { display: none; }

    .data-table {
      width: 808px;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 14px;
      line-height: 22px;
      color: var(--c-title);
    }

    .data-table col { width: 160px; }
    .data-table col:last-child { width: 168px; }

    .data-table th,
    .data-table td {
      height: 36px;
      padding: 5px 8px 6px;
      border-bottom: 1px solid rgba(0, 0, 0, .06);
      text-align: left;
      white-space: nowrap;
      font-weight: 400;
    }

    .data-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--c-head);
      font-weight: 500;
    }

    .data-table th:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 7px;
      width: 1px;
      height: 22px;
      background: rgba(0, 0, 0, .06);
    }

    .data-table th img {
      float: right;
      width: 8px;
      height: 12px;
      margin-top: 5px;
    }

    .composer {
      width: 840px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 2;
      transform: translateY(0);
      transition: transform var(--open-ms) var(--ease);
      will-change: transform;
    }

    .page.is-open .composer {
      transform: translateY(0);
      transition-delay: var(--preview-delay-ms);
    }

    .page.is-closing .composer {
      transform: translateY(0);
      transition: transform var(--close-ms) var(--ease) var(--preview-close-delay-ms);
    }

    .input-box { width: 840px; height: 192px; }

    .selector {
      width: 840px;
      height: 52px;
      padding: 8px 16px;
      border: 1px solid var(--c-line);
      border-bottom: 0;
      border-radius: 12px 12px 0 0;
      background: var(--c-head);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .selector-inner {
      width: 808px;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .mode-group {
      width: 403px;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .pill {
      height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--c-line-soft);
      border-radius: 20px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 14px;
      line-height: 20px;
      white-space: nowrap;
    }

    .pill img { display: block; width: 16px; height: 16px; }
    .pill.is-active { border-color: var(--c-brand); background: var(--c-select); color: var(--c-brand); }
    .pill.model { width: 100px; }
    .pill.analysis { width: 100px; }
    .pill.report { width: 87px; }
    .pill.more { width: 92px; }
    .pill.data { width: 72px; flex: 0 0 auto; }

    .line20 {
      width: 0;
      height: 20px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .line20::before {
      content: "";
      width: 1px;
      height: 20px;
      background: var(--c-line);
      display: block;
    }

    .line20 img { display: none; }

    .tag-region {
      width: 301px;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      overflow: visible;
    }

    .selector.no-tags .tag-region,
    .selector.no-tags .tag-divider {
      display: none;
    }

    .selector.no-tags .selector-inner {
      gap: 0;
    }

    .selector.no-tags .data-divider {
      display: none;
    }

    .selector.no-tags .pill.data {
      position: absolute;
      right: 0;
      top: 0;
    }

    .tags-window {
      position: relative;
      width: 237px;
      height: 36px;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .tags-strip {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }

    .tags-strip::-webkit-scrollbar { display: none; }

    .tag {
      position: relative;
      height: 36px;
      padding: 8px 12px;
      border-radius: 20px;
      background: var(--c-tag);
      color: var(--c-title);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      font-size: 14px;
      line-height: 20px;
      white-space: nowrap;
    }

    .tag[data-name="国际销售数据"],
    .tag[data-name="华东销售数据"] { width: 108px; }
    .tag[data-name="销售额"] { width: 66px; }

    .tag.is-selected {
      background: var(--c-select);
      color: var(--c-brand);
    }

    .tag-hover-layer {
      position: absolute;
      right: 0;
      top: 0;
      width: 36px;
      height: 36px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      opacity: 0;
      background: linear-gradient(270deg, var(--c-select) 70.833%, rgba(241, 240, 255, 0) 100%);
      transition: opacity 120ms linear;
    }

    .tag:not(.is-selected) .tag-hover-layer {
      background: linear-gradient(270deg, var(--c-tag) 70.833%, rgba(243, 243, 250, 0) 100%);
    }

    .tag:hover .tag-hover-layer { opacity: 1; }

    .tag-hover-layer img { width: 14px; height: 14px; transform: rotate(90deg) scaleY(-1); }

    .tag-tip {
      display: none;
    }

    .tag-tip-text {
      height: 36px;
      padding: 8px;
      border-radius: 4px;
      background: rgba(0, 0, 0, .75);
      color: #fff;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, .2));
    }

    .tag-tip img {
      width: 11.314px;
      height: 4.828px;
      display: block;
    }

    .floating-tag-tooltip {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -100%) translateY(4px);
      transition: opacity 140ms linear, transform 140ms var(--ease);
    }

    .floating-tag-tooltip.is-visible {
      opacity: .9;
      transform: translate(-50%, -100%) translateY(0);
    }

    .floating-tag-tooltip .tag-tip-text {
      white-space: nowrap;
    }

    .floating-tag-tooltip > img {
      width: 28px;
      height: 4px;
      display: block;
    }

    .tag-window-fade {
      position: absolute;
      right: 0;
      top: 0;
      width: 16px;
      height: 36px;
      background: linear-gradient(90deg, rgba(250, 250, 252, 0), #fafafc);
      pointer-events: none;
    }

    .tag-tool {
      width: 24px;
      height: 24px;
      padding: 4px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      flex: 0 0 auto;
    }

    .tag-tool:hover { background: var(--c-tag); }
    .tag-tool img { width: 16px; height: 16px; display: block; }
    .tag-tool .icon-frame-24 { width: 24px; height: 24px; margin: -4px; }
    .tag-tool.more-btn img { transform: none; }

    .input-area {
      position: relative;
      width: 840px;
      height: 140px;
      padding: 12px 16px 16px;
      border: 1px solid var(--c-line);
      border-radius: 0 0 12px 12px;
      background: #fff;
      box-shadow: 0 8px 8px rgba(0, 0, 51, .04);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .prompt {
      position: absolute;
      inset: 12px 16px 48px;
      width: 808px;
      border: 0;
      outline: 0;
      resize: none;
      background: transparent;
      color: var(--c-title);
      font-size: 16px;
      line-height: 24px;
    }

    .hint {
      height: 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--c-muted);
      font-size: 16px;
      line-height: 24px;
      pointer-events: none;
      transition: opacity 120ms linear;
    }

    .hint.is-hidden { opacity: 0; }

    .hint-chip {
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      background: var(--c-tag);
      display: inline-flex;
      align-items: center;
    }

    .send-row {
      height: 36px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 22.5px;
      background: #d3d3eb;
      padding: 9px;
      display: grid;
      place-items: center;
      cursor: default;
    }

    .send-btn img { width: 18px; height: 18px; display: block; }

    .questions {
      position: relative;
      width: 840px;
      height: 32px;
      overflow: hidden;
    }

    .question-strip {
      width: 800px;
      height: 32px;
      display: flex;
      gap: 8px;
      overflow: hidden;
    }

    .question {
      height: 32px;
      padding: 5px 12px;
      border: 1px solid var(--c-line-soft);
      border-radius: 4px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--c-title);
      font-size: 14px;
      line-height: 22px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .question.q1 { width: 206px; justify-content: space-between; }
    .question.q2 { width: 164px; }
    .question.q3 { width: 198px; }
    .question.q4 { width: 164px; }
    .question.q5 { width: 226px; }

    .question img { width: 14px; height: 14px; display: block; }

    .questions-fade {
      position: absolute;
      left: 784px;
      top: 0;
      width: 16px;
      height: 32px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0), #fff);
    }

    .questions-more {
      position: absolute;
      left: 808px;
      top: 0;
      width: 32px;
      height: 32px;
      padding: 8px;
      border-radius: 4px;
    }

    .questions-more img {
      width: 32px;
      height: 32px;
      margin: -8px;
      display: block;
      transform: none;
    }

    .settings-button {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, .78);
      color: #fff;
      z-index: 20;
    }

    .settings-button::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    .settings-button::after {
      content: "";
      position: absolute;
      inset: 17px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 -12px 0 -5px currentColor, 0 12px 0 -5px currentColor, -12px 0 0 -5px currentColor, 12px 0 0 -5px currentColor;
    }

    .panel {
      position: fixed;
      right: 24px;
      bottom: 76px;
      width: min(360px, calc(100vw - 48px));
      display: none;
      padding: 16px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 16px 46px rgba(0, 0, 0, .16);
      z-index: 19;
    }

    .panel.open { display: block; }
    .panel-title { margin: 0 0 10px; font-size: 15px; font-weight: 600; }

    .control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid rgba(0, 0, 0, .06);
      font-size: 13px;
    }

    .control:first-of-type { border-top: 0; }
    .control output { min-width: 68px; color: rgba(0, 0, 0, .55); text-align: right; }
    .control input[type="range"] { grid-column: 1 / -1; width: 100%; accent-color: #333; }
    .control select { justify-self: end; max-width: 180px; }
  </style>

    const data = {
      "国际销售数据": {

          ["2026-02-20", "0.45万", "办公用品", "广东", "器具"],

          ["2026-02-20", "0.45万", "家具", "辽宁", "纸张"]

      "销售额": {
        scope: "按月统计销售额，保留订单日期、类别和区域维度",
        desc: "销售额数据用于观察金额趋势、类别贡献与地区变化",
        rows: [
          ["2026-02-20", "0.45万", "技术", "河南", "设备"],
          ["2026-02-21", "1.28万", "办公用品", "山东", "器具"],

          ["2026-02-24", "0.67万", "家具", "辽宁", "纸张"],

          ["2026-02-26", "0.38万", "办公用品", "北京", "器具"]

      },
      "华东销售数据": {
        scope: "华东区域销售明细，聚焦省市、订单与商品分类",
        desc: "用于查看华东区域销售结构和品类分布",
        rows: [
          ["2026-02-20", "0.88万", "办公用品", "上海", "器具"],
          ["2026-02-20", "1.06万", "技术", "浙江", "设备"],
          ["2026-02-21", "0.62万", "家具", "江苏", "纸张"],
          ["2026-02-22", "1.32万", "技术", "安徽", "设备"],
          ["2026-02-23", "0.55万", "家具", "福建", "纸张"],

          ["2026-02-25", "1.18万", "技术", "江西", "设备"]
        ]
      }
    };

    let tags = ["国际销售数据", "销售额", "华东销售数据", "华东销售数据"];
    let selected = null;
    let switchTimer = 0;
    let closeTimer = 0;

    function cssMs(name, fallback) {
      const value = Number.parseFloat(getComputedStyle(root).getPropertyValue(name));
      return Number.isFinite(value) ? value : fallback;
    }

    function syncMotionTiming() {
      const overlap = Math.max(0, Math.min(1, Number.parseFloat(getComputedStyle(root).getPropertyValue("--overlap")) || 0));
      const heroMs = cssMs("--hero-fade-ms", 150);
      const openMs = cssMs("--open-ms", 500);
      const closeMs = cssMs("--close-ms", 360);
      const smallMs = cssMs("--small-ms", 220);
      const previewDelay = heroMs * (1 - overlap);
      const smallDelay = previewDelay + openMs * (1 - overlap);
      const previewCloseDelay = smallMs * (1 - overlap);
      const heroReturnDelay = previewCloseDelay + closeMs * (1 - overlap);
      root.style.setProperty("--preview-delay-ms", `${Math.round(previewDelay)}ms`);
      root.style.setProperty("--small-delay-ms", `${Math.round(smallDelay)}ms`);
      root.style.setProperty("--preview-close-delay-ms", `${Math.round(previewCloseDelay)}ms`);
      root.style.setProperty("--hero-return-delay-ms", `${Math.round(heroReturnDelay)}ms`);
    }

    function showTagTip(tag) {
      floatingTipText.textContent = tag.dataset.name;
      const rect = tag.getBoundingClientRect();
      floatingTip.style.left = `${rect.left + rect.width / 2}px`;
      floatingTip.style.top = `${rect.top + 4}px`;
      floatingTip.classList.add("is-visible");
    }

    function hideTagTip() {
      floatingTip.classList.remove("is-visible");
    }

    function renderRows(name) {
      const item = data[name] || data["国际销售数据"];
      titleEl.textContent = name;
      scopeEl.textContent = item.scope;
      descEl.textContent = item.desc;
      rowsEl.innerHTML = item.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`).join("");
    }

    function openPreview(name) {
      clearTimeout(closeTimer);
      selected = name;
      renderRows(name);
      page.classList.remove("is-closing");
      page.classList.add("is-open");
      renderTags();
    }

    function closePreview() {
      selected = null;
      clearTimeout(closeTimer);
      syncMotionTiming();
      page.classList.add("is-closing");
      page.classList.remove("is-open");
      const previewDone = cssMs("--preview-close-delay-ms", 132) + cssMs("--close-ms", 360);
      const heroDone = cssMs("--hero-return-delay-ms", 336) + cssMs("--hero-fade-ms", 150);
      const total = Math.max(previewDone, heroDone) + 120;
      closeTimer = window.setTimeout(() => page.classList.remove("is-closing"), total);
      renderTags();
    }

    function switchPreview(name) {
      selected = name;
      renderTags();
      clearTimeout(switchTimer);
      previewContent.classList.add("is-switching");
      const ms = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--switch-fade-ms")) || 200;
      switchTimer = window.setTimeout(() => {
        renderRows(name);
        previewContent.classList.remove("is-switching");
      }, ms);
    }

    function onTag(name) {
      if (selected === name) return closePreview();
      if (page.classList.contains("is-open")) return switchPreview(name);
      openPreview(name);
    }

    function deleteTag(index) {
      const name = tags[index];
      tags.splice(index, 1);
      if (selected === name) closePreview();
      renderTags();
    }

    function renderTags() {
      selector.classList.toggle("no-tags", tags.length === 0);
      hideTagTip();
      tagsStrip.innerHTML = tags.map((name, index) => `
        <button class="tag ${selected === name ? "is-selected" : ""}" data-name="${name}" data-index="${index}" type="button">
          <span>${name}</span>
          <span class="tag-hover-layer" data-delete="${index}"><img src="${AS.tagClose}" alt=""></span>
          <span class="tag-tip"><span class="tag-tip-text">${name}</span><img src="${AS.tipArrow}" alt=""></span>
        </button>
      `).join("");
      tagsStrip.querySelectorAll(".tag").forEach(tag => {
        tag.addEventListener("click", () => onTag(tag.dataset.name));
        tag.addEventListener("mouseenter", () => showTagTip(tag));
        tag.addEventListener("mousemove", () => showTagTip(tag));
        tag.addEventListener("mouseleave", hideTagTip);
      });
      tagsStrip.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", event => {
          event.stopPropagation();
          deleteTag(Number(btn.dataset.delete));
        });
      });
    }

    document.querySelector(".close-preview").addEventListener("click", closePreview);
    document.querySelector(".desc-toggle").addEventListener("click", () => previewCard.classList.toggle("is-desc-collapsed"));
    document.querySelector(".preview-title").addEventListener("click", () => previewCard.classList.toggle("is-desc-collapsed"));
    document.querySelector(".clear-tags").addEventListener("click", () => {
      tags = [];
      if (selected) closePreview();
      renderTags();
    });
    document.querySelector(".settings-button").addEventListener("click", () => panel.classList.toggle("open"));
    prompt.addEventListener("input", () => hint.classList.toggle("is-hidden", prompt.value.trim().length > 0));
    tagsStrip.addEventListener("wheel", event => {
      if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
        event.preventDefault();
        tagsStrip.scrollLeft += event.deltaY;
      }
    }, { passive: false });

    document.querySelectorAll(".panel input, .panel select").forEach(control => {
      const output = control.parentElement.querySelector("output");
      const update = () => {
        let value = control.value;
        let label = value;
        if (control.dataset.kind === "ratio") {
          value = String(Number(control.value) / 100);
          label = `${control.value}%`;
        } else if (control.dataset.unit) {
          value = `${control.value}${control.dataset.unit}`;
          label = value;
        }
        root.style.setProperty(control.dataset.var, value);
        if (output) output.textContent = label;
        syncMotionTiming();
      };
      control.addEventListener("input", update);
      control.addEventListener("change", update);
      update();
    });

    syncMotionTiming();
    renderRows("国际销售数据");
    renderTags();
  </script>
